{% load static %}

<nav class="mobile-bottom-nav" aria-label="Мобільна навігація">
    <a href="{% url 'core:home' %}" class="mobile-nav-item{% if request.path == '/' %} active{% endif %}">
        <svg class="mobile-nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span class="mobile-nav-label">Головна</span>
    </a>

    <button type="button" class="mobile-nav-item" id="catalogMenuBtn">
        <svg class="mobile-nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
        <span class="mobile-nav-label">Каталог</span>
    </button>

    <a href="{% url 'cart:detail' %}" class="mobile-nav-item{% if 'cart' in request.path %} active{% endif %}">
        <div class="mobile-nav-icon-wrap">
            <svg class="mobile-nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                <line x1="3" y1="6" x2="21" y2="6"/>
                <path d="M16 10a4 4 0 01-8 0"/>
            </svg>
            <span class="mobile-nav-badge{% if cart_total_items == 0 %} hidden{% endif %}" id="mobileCartBadge">{{ cart_total_items|default:"" }}</span>
        </div>
        <span class="mobile-nav-label">Кошик</span>
    </a>

    <a href="{% url 'wishlist:list' %}" class="mobile-nav-item{% if 'wishlist' in request.path %} active{% endif %}">
        <div class="mobile-nav-icon-wrap">
            <svg class="mobile-nav-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
            </svg>
            <span class="mobile-nav-badge{% if wishlist_count == 0 %} hidden{% endif %}">{{ wishlist_count|default:"" }}</span>
        </div>
        <span class="mobile-nav-label">Обране</span>
    </a>
</nav>
